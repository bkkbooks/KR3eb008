body:
  text: 猝中暴厥辨暴厥五證辨中風類中辨風中之狀猝然僕不省人事口噤涎潮身熱自汗惡風中後見瘄痱偏枯喎僻痹痛諸症火中之狀猝僕不省人事口噤涎潮內外皆熱不惡風自汗口後或見口瘖偏枯喎僻痹痛諸證濕中之狀猝僕不省人事口噤涎潮身不甚熱中後亦見口瘄偏枯喎僻痹痛諸證古云風者謂八方風邪中人也火中者即劉河間所謂心火暴甚忽然勃發而昏僕無知也濕中者即朱丹溪所謂濕生談談生熱熱生風風痰上壅故亦猝然無知也三者內外之因不同而病相類故曰類中風然中風者其人表虛外為風邪所中直入臟腑鼓痰火而作是風為本而痰火為標火中濕中二者乃痰火內動而生風是濕痰與火為本而風為標治應不同三者之證相類有可辨者在風則身熱自汗在火則內外皆熱而不惡風無汗在濕痰則痰盛而身不熱以此辨之二病中後隨顯臟腑之中證者是必牙挾風邪而作與中風相似一類故名之曰類中風口噤涎潮同糞異辨諸瘖證辨半身不遂手足不隨麻木不仁痿躄軃曳辨半身不遂者或左或右半體頑麻肢節拳曲而不直遂在左為癱在右為瘓手足不隨者手足痿罷而不隨或軟弱無力麻木不仁者肌肉頑痹搔之不知痛癢痿躄者下體盤骨懈弛機關不束行則而不正軃朵曳者肩而曳行半身不遂即偏枯也四肢不隨即瘓也麻木不仁即著痹也曳亦痿之類也偏枯三證辨喎僻五證辨冬令外傷七證辨春令外傷七證辨夏令外傷七證辨秋令久傷三證辨溫疫三證辨暑霍亂寒霍亂二證辨吐利證辨四時瘧十二證辨傷飲證辨傷食食傷脾胃辨惡食不能飢不欲食三證辨飢飽傷中勞役傷中辨外傷內傷辨內傷脾胃內傷肝腎辨虛損勞傷極辨頭痛寒熱內外十五證辨真熱假熱辨陰分潮熱三證辨痰食潮熱辨心煩內外證辨惡寒反惡寒辨背惡寒三證辨振栗五證辨寒熱八證辨陽厥陰厥寒厥辨六郁為病辨郁痞證辨痰生百病八症辨飲生諸病五證辨痰飲涎沫辨咳嗽分證合兼證辨喘哮短氣三證辨喘上氣二證辨短氣少氣二證辨吐噦三證辨噯氣厄逆二證辨噎膈膈咽不通三證辨走哺關格辨噎膈反胃三證辨嘈雜心瘥辨嘈雜懊憹煩躁三證辨心下痞胸痹胸痛三證辨水腫氣腫二證辨水腫水脹辨水脹氣血脹谷四證辨中滿如脹辨內傷發黃外傷發黃辨疸黃二證辨五疸證辨黃腫疳血黃辨癥瘕痃癖四證辨五積辨積聚辨諸積兼見證辨息奔息積辨新血衄血畜辨色辨口中出血諸證辨鼻衄血二證辨溲血淋血辨下血諸證辨久痛證辨內痛證辨頭痛分經辨厥氣痛辨大頭瘟雷頭風二證辨頭面腫痛分症經辨心痛心胞絡痛胃痛脾痛胸痛膈痛辨三陰腹痛辨腹痛諸證辨腰痛諸證辨風寒濕熱四痹證辨諸痹證辨行痹支飲痹辨行痹肢節走注痛支飲作痹脅肩背流注痛腳氣腳腫辨太陽風痙二證辨痙項強二證辨痙外因內因辨瘈瘲諸證辨鶴滕風筋攣腳氣三證辨眩暈鬱冒三證辨癲狂癇譫妄四證辨譫妄語辨驚恐二證辨汗辨發汗自盜汗辨發汗者以汗藥發其汗自汗者不分寐而皆汗出頭汗手足汗辨寐瞑臥安四證辨多臥嗜但欲寐三證辨消渴口渴嗌乾辨強中筋疝辨傷寒下痢常病泄瀉諸證辨泄痢辨大便燥大便難大便實大便祕辨癃淋辨癃閉關格辨溺祕轉脬辨小便祕小便少便難小便淋瀝辨膏淋白濁辨氣淋胞痹辨小便不禁遺溺辨夢遺漏精辨白濁小水渾濁辨囊縮辨寒疝木腎辨水疝㿗疝辨沖疝奔豚辨厥疝寒疝辨厥疝囊冷而不堅結腹中冷痛寒疝囊結如石控睪丸痛內障外障青盲辨目昏目暗眩辨耳龍耳閉辨鼻鼾鼻淵腦漏辨鼻流白涕黃水辨牙齒出膿血四證辨重舌木舌辨舌胎辨喉痹喉閉咽腫咽嗌痛辨咽痛喉瘡辨經水淋瀝崩漏辨錯經妄行血溢辨帶下證辨産後鬱冒暈辨腸覃疝瘕辨石瘕宓瘕辨虛勞三證辨郁風血三痛辨寒熱如瘧二症辨血分水分辨經閉妊娠辨漏胎行經辨附虛症用藥法
